<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여먕님 아트머그 리뉴얼</title>

    <link rel="stylesheet" href="./static/css/common.css">
</head>
<body>
    <main class="main">
        <section class="sec" id="intro"></section>
        <section class="sec" id="collab"></section>
        <section class="sec" id="sample"></section>
        <section class="sec" id="type"></section>
        <section class="sec" id="notice"></section>
        <section id="form" class="container formSection">
            <header class="secHead">
                <p class="secHead__kicker">#6</p>
                <h2 class="secHead__title">신청 양식</h2>
                <p class="secHead__desc">⯌ 예약 확정 시 필수로 작성 바랍니다.</p>
            </header>

            <div class="card formCard">
                <form id="commissionForm" class="formGrid" autocomplete="off">
                <label class="field">
                    <span class="field__label">1. 활동 닉네임(KR/EN)</span>
                    <input class="field__input" type="text" name="nickname" placeholder="닉네임을 입력해주세요. (ex. 여먕 yeomyang)" />
                </label>

                <label class="field">
                    <span class="field__label">2. 방송 플랫폼</span>
                    <input class="field__input" type="text" name="platform" placeholder="방송하시는 플랫폼을 입력해주세요." />
                </label>

                <label class="field">
                    <span class="field__label">3. SNS</span>
                    <input class="field__input" type="url" name="sns" placeholder="활동하시는 sns 링크를 입력해주세요." />
                </label>

                <label class="field">
                    <span class="field__label">4. 데뷔 예정일</span>
                    <input class="field__input" type="text" name="debut" placeholder="ex. 27년 하반기 데뷔 예정입니다 / 올해 11월 데뷔예정입니다." />
                </label>

                <label class="field field--wide">
                    <span class="field__label">5. 추가옵션</span>
                    <input class="field__input" type="text" name="options" placeholder="ex. 간단한 표정 추가, 몸체 추가 등등" />
                </label>

                <fieldset class="fieldGroup">
                    <legend class="fieldGroup__label">6. 포트폴리오 공개 여부</legend>
                    <div class="seg" role="radiogroup" aria-label="포트폴리오 공개 여부">
                    <label class="seg__item">
                        <input class="seg__input" type="radio" name="portfolio" value="공개" />
                        <span class="seg__btn">공개</span>
                    </label>
                    <label class="seg__item">
                        <input class="seg__input" type="radio" name="portfolio" value="데뷔 전 까지 비공개" />
                        <span class="seg__btn">데뷔 전</span>
                    </label>
                    <label class="seg__item">
                        <input class="seg__input" type="radio" name="portfolio" value="데뷔 후 n개월 비공개" />
                        <span class="seg__btn">데뷔 후 n개월</span>
                    </label>
                    <label class="seg__item">
                        <input class="seg__input" type="radio" name="portfolio" value="영구 비공개" />
                        <span class="seg__btn">영구</span>
                    </label>
                    </div>
                </fieldset>

                <fieldset class="fieldGroup">
                    <legend class="fieldGroup__label">7. 저작권 구매</legend>
                    <div class="yn">
                    <label class="yn__item">
                        <input class="yn__input" type="radio" name="copyright" value="YES" />
                        <span class="yn__btn">YES</span>
                    </label>
                    <label class="yn__item">
                        <input class="yn__input" type="radio" name="copyright" value="NO" />
                        <span class="yn__btn">NO</span>
                    </label>
                    </div>
                </fieldset>

                <fieldset class="fieldGroup">
                    <legend class="fieldGroup__label">8. 협업 (YES 선택 시 작가님 이름을 10번에)</legend>
                    <div class="yn">
                    <label class="yn__item">
                        <input class="yn__input" type="radio" name="collab" value="YES" />
                        <span class="yn__btn">YES</span>
                    </label>
                    <label class="yn__item">
                        <input class="yn__input" type="radio" name="collab" value="NO" />
                        <span class="yn__btn">NO</span>
                    </label>
                    </div>
                </fieldset>

                <label class="field field--wide">
                    <span class="field__label">9. 캐릭터컨셉 자료 (이미지 필수)</span>
                    <textarea class="field__textarea" name="concept" rows="6" placeholder="키 / 연령(외관나이) / 성별 / 체형(가슴크기포함) / 대표컬러 / 분위기 / 의상 스타일 / 중요 소품 등등... 캐릭터를 표현할 수 있는 모든 설명을 환영합니다! 구체적으로 정해져 있지 않아도 괜찮습니다! 상담을 통해 도와드립니다"></textarea>
                </label>

                <label class="field field--wide">
                    <span class="field__label">10. 기타 요구사항</span>
                    <textarea class="field__textarea" name="requests" rows="4" placeholder="ex. 이 캐릭터는 이런 느낌이면 좋겠습니다~ 없을 시 공란 부탁드립니다."></textarea>
                </label>
                </form>
                <div class="formTopBar">
                <div class="formActions">
                    <button type="button" class="button formBtn" id="btnCopyForm">양식 복사</button>
                    <button type="button" class="button formBtn formBtn--ghost" id="btnResetForm">초기화</button>
                </div>
                </div>
                <div class="toast" id="formToast" aria-live="polite" aria-atomic="true"></div>
            </div>
        </section>
    </main>

    <script src="./static/js/app.js" defer></script>
</body>
</html>
